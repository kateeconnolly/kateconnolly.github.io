<body>
  <h1>HI!</h1>

  <img src="dogggg.png" alt="dog" width="250">
</body>

<h2>kate gpt</h2>

<div id="chatbox" style="border:1px solid black; padding:10px; width:300px; height:200px; overflow-y:scroll;">
  <p><strong>KateBot:</strong> hiiiiiiiiiii</p>
</div>

<input id="userInput" type="text" placeholder="type here..." />
<button onclick="sendMessage()">Send</button>

<script>
  function sendMessage() {
    const input = document.getElementById("userInput");
    const chatbox = document.getElementById("chatbox");
    const message = input.value;

    if (message.trim() === "") return;

    chatbox.innerHTML += "<p><strong>You:</strong> " + message + "</p>";

    const responses = [
      "there's no way",
      "there's no path as such",
      "are you serious",
      "i wanna go home",
      "tents"
    ];

    const reply = responses[Math.floor(Math.random() * responses.length)];

    chatbox.innerHTML += "<p><strong>KateBot:</strong> " + reply + "</p>";

    input.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
  }
</script>
